name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  core-regression:
    name: Core regression (py${{ matrix.python-version }}, Qt release pin)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xinput0 libxcb-xfixes0 libxcb-shape0 libxcb-glx0 \
            libxcb-cursor0 \
            fonts-noto-color-emoji

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints-release.txt -r requirements.txt

      - name: Run targeted regression suite
        run: |
          python -m pytest \
            tests/test_deep_extraction.py \
            tests/test_parser.py \
            tests/test_false_positive_filters.py \
            tests/test_text_type_filtering.py \
            tests/test_reliability_hardening.py \
            tests/test_log_copy_feature.py \
            tests/test_runtime_hook_diagnostics.py \
            tests/test_v276_features.py \
            tests/test_release_linux_artifacts.py \
            tests/test_ci_pyqt_compat.py \
            -q

      - name: Smoke test source Qt startup
        run: |
          python - <<'PY'
          import os
          import subprocess
          env = dict(os.environ, RENLOCALIZER_QT_SMOKE_TEST="1")
          subprocess.run(
              ["xvfb-run", "-a", "python", "run.py"],
              env=env,
              check=True,
              timeout=90,
          )
          PY

  linux-pyqt-compat:
    name: Linux source compatibility (PyQt6 ${{ matrix.pyqt6-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        pyqt6-version: ['6.6.1', '6.7.1', '6.8.1', '6.9.1', '6.10.1']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xinput0 libxcb-xfixes0 libxcb-shape0 libxcb-glx0 \
            libxcb-cursor0 \
            fonts-noto-color-emoji

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "PyQt6==${{ matrix.pyqt6-version }}"

      - name: Show resolved PyQt6 version
        run: |
          python -c "import importlib.metadata as m; print('PyQt6', m.version('PyQt6')); print('PyQt6-Qt6', m.version('PyQt6-Qt6')); print('PyQt6-sip', m.version('PyQt6-sip'))"

      - name: Run compatibility regression suite
        run: |
          python -m pytest \
            tests/test_deep_extraction.py \
            tests/test_parser.py \
            tests/test_false_positive_filters.py \
            tests/test_text_type_filtering.py \
            tests/test_reliability_hardening.py \
            tests/test_log_copy_feature.py \
            tests/test_runtime_hook_diagnostics.py \
            tests/test_v276_features.py \
            tests/test_ci_pyqt_compat.py \
            -q

      - name: Smoke test source Qt startup
        run: |
          python - <<'PY'
          import os
          import subprocess
          env = dict(os.environ, RENLOCALIZER_QT_SMOKE_TEST="1")
          subprocess.run(
              ["xvfb-run", "-a", "python", "run.py"],
              env=env,
              check=True,
              timeout=90,
          )
          PY
