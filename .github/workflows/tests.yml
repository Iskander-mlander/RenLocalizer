name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  core-regression:
    name: Core regression (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          if command -v pacman &> /dev/null; then
            # Arch Linux
            sudo pacman -Syu --noconfirm xvfb \
              libgl glibc libxkbcommon libdbus xcb-util-image xcb-util-keysyms \
              xcb-util-renderutil xcb-util-cursor noto-fonts-emoji
          else
            # Debian/Ubuntu
            sudo apt-get update
            sudo apt-get install -y xvfb \
              libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
              libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
              libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
              libxcb-xinput0 libxcb-xfixes0 libxcb-shape0 libxcb-glx0 \
              libxcb-cursor0 \
              fonts-noto-color-emoji
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run targeted regression suite
        shell: bash
        run: |
          python -m pytest tests/test_parser.py tests/test_false_positive_filters.py tests/test_text_type_filtering.py tests/test_reliability_hardening.py tests/test_runtime_coverage.py tests/test_runtime_templates.py tests/test_runtime_hook_diagnostics.py tests/test_release_linux_artifacts.py -q --rootdir .

      - name: Smoke test source Qt startup (Linux)
        if: runner.os == 'Linux'
        run: |
          export RENLOCALIZER_QT_SMOKE_TEST="1"
          xvfb-run -a python run_lite.py

      - name: Smoke test source Qt startup (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export RENLOCALIZER_QT_SMOKE_TEST="1"
          export QT_QPA_PLATFORM="offscreen"
          python run_lite.py

  archlinux:
    name: Arch Linux (Python 3.14)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          pacman -Sy --noconfirm --needed \
            python python-pip git qt6-base xorg-server-xvfb \
            libxcb libxkbcommon noto-fonts-emoji
          pacman -Scc --noconfirm

      - name: Install Python deps
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Patch aiohttp
        run: . venv/bin/activate && python scripts/patch_aiohttp.py

      - name: Run tests
        run: |
          . venv/bin/activate
          python -m pytest tests/test_parser.py tests/test_false_positive_filters.py tests/test_text_type_filtering.py tests/test_reliability_hardening.py -q --rootdir .

  linux-pyqt-compat:
    name: Linux source compatibility (PyQt6 ${{ matrix.pyqt6-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - pyqt6-version: '6.6.1'
            pyqt6_qt6_spec: '>=6.6.0,<6.7.0'
            pyqt6_sip_spec: '>=13.6,<14'
          - pyqt6-version: '6.7.1'
            pyqt6_qt6_spec: '>=6.7.0,<6.8.0'
            pyqt6_sip_spec: '>=13.8,<14'
          - pyqt6-version: '6.8.1'
            pyqt6_qt6_spec: '>=6.8.0,<6.9.0'
            pyqt6_sip_spec: '>=13.8,<14'
          - pyqt6-version: '6.9.1'
            pyqt6_qt6_spec: '>=6.9.0,<6.10.0'
            pyqt6_sip_spec: '>=13.8,<14'
          - pyqt6-version: '6.10.1'
            pyqt6_qt6_spec: '>=6.10.0,<6.11.0'
            pyqt6_sip_spec: '>=13.8,<14'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xinput0 libxcb-xfixes0 libxcb-shape0 libxcb-glx0 \
            libxcb-cursor0 \
            fonts-noto-color-emoji

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip uninstall -y PyQt6 PyQt6-Qt6 PyQt6-sip || true
          pip install --force-reinstall --no-cache-dir \
            "PyQt6==${{ matrix.pyqt6-version }}" \
            "PyQt6-Qt6${{ matrix.pyqt6_qt6_spec }}" \
            "PyQt6-sip${{ matrix.pyqt6_sip_spec }}"

      - name: Show resolved PyQt6 version
        run: |
          python -c "import importlib.metadata as m; print('PyQt6', m.version('PyQt6')); print('PyQt6-Qt6', m.version('PyQt6-Qt6')); print('PyQt6-sip', m.version('PyQt6-sip'))"

      - name: Run compatibility regression suite
        run: |
          python -m pytest tests/test_parser.py tests/test_false_positive_filters.py tests/test_text_type_filtering.py tests/test_reliability_hardening.py tests/test_runtime_coverage.py tests/test_runtime_templates.py tests/test_runtime_hook_diagnostics.py -q --rootdir .

      - name: Smoke test source Qt startup
        run: |
          export RENLOCALIZER_QT_SMOKE_TEST="1"
          xvfb-run -a python run_lite.py
