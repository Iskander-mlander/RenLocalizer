[tox]
envlist = py{310,311,312}-release, py311-pyqt{66,67,68,69,610}
skip_missing_interpreters = true
isolated_build = false

[testenv]
deps =
    release: -cconstraints-release.txt
    -rrequirements.txt
    pyqt66: PyQt6==6.6.1
    pyqt67: PyQt6==6.7.1
    pyqt68: PyQt6==6.8.1
    pyqt69: PyQt6==6.9.1
    pyqt610: PyQt6==6.10.1
commands =
    python -m pytest tests/test_deep_extraction.py tests/test_parser.py tests/test_false_positive_filters.py tests/test_text_type_filtering.py tests/test_reliability_hardening.py tests/test_log_copy_feature.py tests/test_runtime_hook_diagnostics.py tests/test_v276_features.py tests/test_release_linux_artifacts.py tests/test_ci_pyqt_compat.py -q
